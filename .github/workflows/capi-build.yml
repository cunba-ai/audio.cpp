name: C ABI Build

# Builds the C ABI shared library (libaudiocpp.so / audiocpp.dll) for each GPU
# backend, borrowing the proven toolchain-install patterns from llama.cpp's
# build-combined-backends.yml (cached CUDA/HIP SDK, the real AMD HIP SDK .exe,
# the offline oneAPI installer + Level Zero SDK, ccache). Unlike the llama.cpp
# reference, this produces single-backend shared libraries (no Vulkan co-build,
# no GGML_BACKEND_DL) and ships them via a GitHub draft release (no OSS).
#
# Linux jobs run in vendor containers (CUDA/ROCm/SYCL) and are the reliable
# signal. Windows CUDA must pass; Windows ROCm and SYCL are best-effort
# (continue-on-error): hosted runners have no AMD/Intel GPU, so they only
# prove MSVC configure/compile, and the vendor toolchains are large/flaky.

on:
  push:
    branches:
      - main
      - dev
      - capi/**
    paths:
      - '.github/workflows/capi-build.yml'
      - 'CMakeLists.txt'
      - 'capi/**'
      - 'src/**'
      - 'include/**'
      - 'external/ggml/**'
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. capi-v0.1.0). Leave empty to skip release upload.'
        required: false
        type: string

permissions:
  contents: read
  actions: write   # needed to save toolchain caches

env:
  CUDA_ARCHS: "80;86;89;90"
  AMDGPU_TARGETS: "gfx1100;gfx1101;gfx1102;gfx1150;gfx1151"

concurrency:
  group: capi-build-${{ github.ref }}-${{ github.event.inputs.release_tag || 'none' }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════════════════════════════════
  # Linux: CUDA+CPU, ROCm+CPU, SYCL+CPU
  # ════════════════════════════════════════════════════════════════════════
  linux:
    name: Linux ${{ matrix.config.name }}
    runs-on: ubuntu-22.04
    container:
      image: ${{ matrix.config.container }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: CUDA-CPU
            container: nvidia/cuda:12.4.1-devel-ubuntu22.04
            cmake_extra: '-DENGINE_ENABLE_CUDA=ON'
            artifact_suffix: linux-cuda-cpu
          - name: ROCm-CPU
            container: rocm/dev-ubuntu-22.04:6.4-complete
            cmake_extra: '-DGGML_HIP=ON -DAMDGPU_TARGETS=gfx1100 -DCMAKE_PREFIX_PATH=/opt/rocm'
            artifact_suffix: linux-rocm-cpu
          - name: SYCL-CPU
            container: intel/oneapi-basekit:2024.2.1-0-devel-ubuntu22.04
            cmake_extra: '-DGGML_SYCL=ON -DGGML_SYCL_TARGET=INTEL'
            artifact_suffix: linux-sycl-cpu

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build deps
        run: |
          apt-get update && apt-get install -y cmake git build-essential

      - name: ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: capi-linux-${{ matrix.config.artifact_suffix }}
          update-package-index: true

      - name: Configure
        run: |
          mkdir -p build
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DAUDIOCPP_BUILD_CAPI=ON \
            -DENGINE_BUILD_EXAMPLES=OFF \
            -DENGINE_ENABLE_OPENMP=OFF \
            ${{ matrix.config.cmake_extra }}

      - name: Build audiocpp shared library
        run: |
          cmake --build build --parallel $(nproc) --target audiocpp

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find build -name "libaudiocpp.so" -exec cp {} artifacts/ \;
          cp capi/include/audiocpp.h artifacts/
          strip artifacts/libaudiocpp.so 2>/dev/null || true
          ls -la artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: audiocpp-${{ matrix.config.artifact_suffix }}
          path: artifacts/

  # ════════════════════════════════════════════════════════════════════════
  # Windows: CUDA+CPU (primary), ROCm+CPU (best-effort), SYCL+CPU (best-effort)
  # ════════════════════════════════════════════════════════════════════════
  windows:
    name: Windows ${{ matrix.config.name }}
    runs-on: windows-2022
    continue-on-error: ${{ matrix.config.best_effort }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: CUDA-CPU
            setup: cuda
            artifact_suffix: windows-cuda-cpu
            best_effort: false
          - name: ROCm-CPU
            setup: rocm
            artifact_suffix: windows-rocm-cpu
            best_effort: true
          - name: SYCL-CPU
            setup: sycl
            artifact_suffix: windows-sycl-cpu
            best_effort: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup CUDA Toolkit
        if: matrix.config.setup == 'cuda'
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: '12.6.2'
          method: 'network'

      # ── ROCm/HIP: real AMD HIP SDK installer (llama.cpp pattern) ──────────
      # Hosted runners have no AMD GPU, so this only proves configure/compile.
      # Best-effort (continue-on-error) — Linux ROCm is the reliable signal.
      - name: Cache ROCm Installation
        if: matrix.config.setup == 'rocm'
        id: cache-rocm
        uses: actions/cache@v5
        with:
          path: C:\Program Files\AMD\ROCm
          key: cache-gha-rocm-26.Q1-${{ runner.os }}

      - name: Install ROCm HIP SDK
        if: matrix.config.setup == 'rocm' && steps.cache-rocm.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $url = "https://download.amd.com/developer/eula/rocm-hub/AMD-Software-PRO-Edition-26.Q1-Win11-For-HIP.exe"
          Write-Host "Downloading AMD HIP SDK Installer..."
          Invoke-WebRequest -Uri $url -OutFile "${env:RUNNER_TEMP}\rocm-install.exe" -UseBasicParsing
          Write-Host "Installing AMD HIP SDK..."
          $proc = Start-Process "${env:RUNNER_TEMP}\rocm-install.exe" -ArgumentList '-install' -NoNewWindow -PassThru
          $completed = $proc.WaitForExit(600000)
          if (-not $completed) {
            Write-Host "##[error]ROCm installation timed out after 10 minutes. Killing the process."
            $proc.Kill()
            exit 1
          }
          if ($proc.ExitCode -ne 0) {
            Write-Host "##[error]ROCm installation failed with exit code $($proc.ExitCode)."
            exit 1
          }

      - name: Verify ROCm HIP SDK
        if: matrix.config.setup == 'rocm'
        shell: pwsh
        run: |
          $hipClang = Get-ChildItem -Path "C:\Program Files\AMD\ROCm" -Recurse -Filter "clang.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $hipClang) {
            Write-Host "##[error]AMD HIP SDK not found (no clang.exe under C:\Program Files\AMD\ROCm). Cannot proceed with ROCm build."
            exit 1
          }
          Write-Host "Found HIP clang at: $($hipClang.FullName)"

      # ── SYCL/DPC++: offline oneAPI installer + Level Zero (llama.cpp pattern) ──
      # Pinned to a known-good oneAPI Essentials offline installer. This URL
      # will eventually rot on Intel's release schedule — swap the constant
      # below if it 403/Access-Denies. Best-effort (continue-on-error).
      - name: Download & Install oneAPI
        if: matrix.config.setup == 'sycl'
        env:
          WINDOWS_BASEKIT_URL: https://registrationcenter-download.intel.com/akdlm/IRC_NAS/b60765d1-2b85-4e85-86b6-cb0e9563a699/intel-deep-learning-essentials-2025.3.3.18_offline.exe
          WINDOWS_DPCPP_MKL: intel.oneapi.win.cpp-dpcpp-common:intel.oneapi.win.mkl.devel:intel.oneapi.win.dnnl:intel.oneapi.win.tbb.devel
        shell: cmd
        run: scripts\install-oneapi.bat "%WINDOWS_BASEKIT_URL%" "%WINDOWS_DPCPP_MKL%"

      - name: Install Level Zero SDK
        if: matrix.config.setup == 'sycl'
        env:
          LEVEL_ZERO_SDK_URL: https://github.com/oneapi-src/level-zero/releases/download/v1.28.2/level-zero-win-sdk-1.28.2.zip
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:LEVEL_ZERO_SDK_URL -OutFile "level-zero-win-sdk.zip" -UseBasicParsing
          Expand-Archive -Path "level-zero-win-sdk.zip" -DestinationPath "C:/level-zero-sdk" -Force
          "LEVEL_ZERO_V1_SDK_PATH=C:/level-zero-sdk" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Verify oneAPI
        if: matrix.config.setup == 'sycl'
        shell: pwsh
        run: |
          if (Test-Path "C:\Program Files (x86)\Intel\oneAPI\setvars.bat") {
            Write-Host "oneAPI installed successfully"
          } else {
            Write-Host "##[error]oneAPI setvars.bat not found after install; DPC++ compiler unavailable. Cannot proceed with SYCL build."
            exit 1
          }

      - name: Configure (CUDA)
        if: matrix.config.setup == 'cuda'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -S . -B build -G "Ninja" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DBUILD_SHARED_LIBS=ON ^
            -DAUDIOCPP_BUILD_CAPI=ON ^
            -DENGINE_BUILD_EXAMPLES=OFF ^
            -DENGINE_ENABLE_OPENMP=OFF ^
            -DENGINE_ENABLE_CUDA=ON ^
            -DCMAKE_CUDA_ARCHITECTURES="${{ env.CUDA_ARCHS }}"

      - name: Configure (ROCm)
        if: matrix.config.setup == 'rocm'
        shell: pwsh
        run: |
          $hipPath = (Resolve-Path 'C:\Program Files\AMD\ROCm\*\bin\clang.exe' | Split-Path | Split-Path)
          Write-Host "HIP_PATH: $hipPath"
          cmake -G "Unix Makefiles" -B build -S . `
            -DCMAKE_C_COMPILER="$hipPath\bin\clang.exe" `
            -DCMAKE_CXX_COMPILER="$hipPath\bin\clang++.exe" `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=ON `
            -DAUDIOCPP_BUILD_CAPI=ON `
            -DENGINE_BUILD_EXAMPLES=OFF `
            -DENGINE_ENABLE_OPENMP=OFF `
            -DGGML_HIP=ON `
            -DGPU_TARGETS="${{ env.AMDGPU_TARGETS }}" `
            -DCMAKE_PREFIX_PATH="$hipPath"

      - name: Configure (SYCL)
        if: matrix.config.setup == 'sycl'
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Intel\oneAPI\setvars.bat" intel64 --force
          cmake -S . -B build -G "Ninja" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_C_COMPILER=cl ^
            -DCMAKE_CXX_COMPILER=icx ^
            -DBUILD_SHARED_LIBS=ON ^
            -DAUDIOCPP_BUILD_CAPI=ON ^
            -DENGINE_BUILD_EXAMPLES=OFF ^
            -DGGML_SYCL=ON ^
            -DGGML_SYCL_F16=OFF ^
            -DGGML_SYCL_TARGET=INTEL

      - name: Build audiocpp shared library (CUDA)
        if: matrix.config.setup == 'cuda'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build build --parallel %NUMBER_OF_PROCESSORS% --target audiocpp

      # ROCm builds with clang (HIP), not MSVC. Add HIP bin to PATH so the
      # clang/clang++ recorded by Configure remains invokable.
      - name: Build audiocpp shared library (ROCm)
        if: matrix.config.setup == 'rocm'
        shell: pwsh
        run: |
          $hipPath = (Resolve-Path 'C:\Program Files\AMD\ROCm\*\bin\clang.exe' | Split-Path | Split-Path)
          $env:Path = "$hipPath\bin;$env:Path"
          cmake --build build --parallel $env:NUMBER_OF_PROCESSORS --target audiocpp

      # SYCL needs oneAPI's setvars.bat (for icx) AND vcvars64.bat (for cl,
      # the C frontend icx targets on Windows).
      - name: Build audiocpp shared library (SYCL)
        if: matrix.config.setup == 'sycl'
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Intel\oneAPI\setvars.bat" intel64 --force
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build build --parallel %NUMBER_OF_PROCESSORS% --target audiocpp

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Get-ChildItem -Path build -Recurse -Filter "audiocpp.dll" | ForEach-Object { Copy-Item $_.FullName -Destination artifacts/ }
          Get-ChildItem -Path build -Recurse -Filter "audiocpp.lib" | ForEach-Object { Copy-Item $_.FullName -Destination artifacts/ }
          Copy-Item capi/include/audiocpp.h -Destination artifacts/
          Get-ChildItem artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: audiocpp-${{ matrix.config.artifact_suffix }}
          path: artifacts/

  # ════════════════════════════════════════════════════════════════════════
  # Release (GitHub draft release; no OSS publish in this repo)
  # ════════════════════════════════════════════════════════════════════════
  release:
    name: Release
    needs: [linux, windows]
    runs-on: ubuntu-latest
    if: always() && github.event.inputs.release_tag != ''

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: C ABI ${{ github.event.inputs.release_tag }}
          body: |
            ## audio.cpp C ABI shared libraries

            | Platform | Backend | Artifact |
            |----------|---------|----------|
            | Linux | CUDA + CPU | `audiocpp-linux-cuda-cpu` |
            | Linux | ROCm + CPU | `audiocpp-linux-rocm-cpu` |
            | Linux | SYCL + CPU | `audiocpp-linux-sycl-cpu` |
            | Windows | CUDA + CPU | `audiocpp-windows-cuda-cpu` |
            | Windows | ROCm + CPU | `audiocpp-windows-rocm-cpu` (best-effort) |
            | Windows | SYCL + CPU | `audiocpp-windows-sycl-cpu` (best-effort) |

            Each artifact contains:
            - `libaudiocpp.so` / `audiocpp.dll` (shared library, ggml symbols hidden)
            - `audiocpp.h` (C ABI header)
          files: |
            artifacts/*/libaudiocpp.so
            artifacts/*/audiocpp.dll
            artifacts/*/audiocpp.lib
            artifacts/*/audiocpp.h
          draft: true
