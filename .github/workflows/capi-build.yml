name: C ABI Build

on:
  push:
    branches:
      - main
      - dev
      - capi/**
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. capi-v0.1.0). Leave empty to skip release upload.'
        required: false
        type: string

concurrency:
  group: capi-build-${{ github.ref }}-${{ github.event.inputs.release_tag || 'none' }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════════════════════════════════
  # Linux: CUDA+CPU, ROCm+CPU, SYCL+CPU
  # ════════════════════════════════════════════════════════════════════════
  linux:
    name: Linux ${{ matrix.config.name }}
    runs-on: ubuntu-22.04
    container:
      image: ${{ matrix.config.container }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: CUDA-CPU
            container: nvidia/cuda:12.4.1-devel-ubuntu22.04
            cmake_extra: '-DENGINE_ENABLE_CUDA=ON'
            artifact_suffix: linux-cuda-cpu
          - name: ROCm-CPU
            container: rocm/dev-ubuntu-22.04:6.4-complete
            cmake_extra: '-DGGML_HIP=ON -DAMDGPU_TARGETS=gfx1100 -DCMAKE_PREFIX_PATH=/opt/rocm'
            artifact_suffix: linux-rocm-cpu
          - name: SYCL-CPU
            container: intel/oneapi-basekit:2024.2.1-0-devel-ubuntu22.04
            cmake_extra: '-DGGML_SYCL=ON -DGGML_SYCL_TARGET=INTEL_XMX'
            artifact_suffix: linux-sycl-cpu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps
        run: |
          apt-get update && apt-get install -y cmake git build-essential

      - name: Configure
        run: |
          mkdir -p build
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DAUDIOCPP_BUILD_CAPI=ON \
            -DENGINE_BUILD_EXAMPLES=OFF \
            -DENGINE_ENABLE_OPENMP=OFF \
            ${{ matrix.config.cmake_extra }}

      - name: Build audiocpp shared library
        run: |
          cmake --build build --parallel $(nproc) --target audiocpp

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find build -name "libaudiocpp.so" -exec cp {} artifacts/ \;
          cp capi/include/audiocpp.h artifacts/
          strip artifacts/libaudiocpp.so 2>/dev/null || true
          ls -la artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: audiocpp-${{ matrix.config.artifact_suffix }}
          path: artifacts/

  # ════════════════════════════════════════════════════════════════════════
  # Windows: CUDA+CPU (primary), ROCm+CPU (best-effort), SYCL+CPU (best-effort)
  # ════════════════════════════════════════════════════════════════════════
  windows:
    name: Windows ${{ matrix.config.name }}
    runs-on: windows-2022
    continue-on-error: ${{ matrix.config.best_effort }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: CUDA-CPU
            setup: cuda
            artifact_suffix: windows-cuda-cpu
            best_effort: false
          - name: ROCm-CPU
            setup: rocm
            artifact_suffix: windows-rocm-cpu
            best_effort: true
          - name: SYCL-CPU
            setup: sycl
            artifact_suffix: windows-sycl-cpu
            best_effort: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CUDA Toolkit
        if: matrix.config.setup == 'cuda'
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: '12.6.2'
          method: 'network'

      - name: Setup ROCm HIP SDK
        if: matrix.config.setup == 'rocm'
        shell: pwsh
        run: |
          Write-Host "Installing AMD HIP SDK via winget..."
          # Try winget first (GitHub runners have AMD drivers sometimes)
          $wingetResult = $null
          try {
            $wingetResult = winget install --id AMDDeploymentManager.HIPSDK --accept-package-agreements --accept-source-agreements 2>&1
            Write-Host "winget output: $wingetResult"
          } catch {
            Write-Host "winget install failed: $_"
          }
          # Fallback: try the AMD HIP SDK installer from GitHub release
          $hipFound = Get-ChildItem -Path "C:\Program Files\AMD" -Recurse -Filter "clang.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $hipFound) {
            Write-Host "winget didn't install HIP SDK, trying direct download..."
            # ROCm on Windows is not reliably installable in CI; mark as best-effort
            Write-Host "WARNING: Could not install AMD HIP SDK. This build may fail."
          } else {
            $hipDir = Split-Path (Split-Path $hipFound.FullName)
            Write-Host "Found HIP at: $hipDir"
            echo "$hipDir\bin" >> $env:GITHUB_PATH
          }

      - name: Setup Intel oneAPI
        if: matrix.config.setup == 'sycl'
        shell: pwsh
        run: |
          Write-Host "Installing Intel oneAPI DPC++ Compiler..."
          # Try the offline installer (large, ~4GB, may timeout on slow runners)
          $url = "https://registrationcenter-download.intel.com/akdlm/IRC_NAS/b0bacc74-0863-4f96-844e-8a2ff5db5e96/w_BaseKit_p_2025.0.0.841_offline.exe"
          try {
            Write-Host "Downloading oneAPI BaseKit (this may take 10+ minutes)..."
            Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\oneapi.exe" -UseBasicParsing -TimeoutSec 600
            Write-Host "Installing DPC++ component only..."
            $proc = Start-Process -FilePath "$env:TEMP\oneapi.exe" -ArgumentList "-s --action install --components intel.oneapi.win.dpcpp-cli --eula accept --log $env:TEMP\oneapi.log" -Wait -PassThru -NoNewWindow
            Write-Host "Installer exit code: $($proc.ExitCode)"
          } catch {
            Write-Host "oneAPI install failed: $_"
            Write-Host "WARNING: Could not install Intel oneAPI. This build may fail."
          }
          # Verify
          if (Test-Path "C:\Program Files (x86)\Intel\oneAPI\setvars.bat") {
            Write-Host "oneAPI installed successfully"
          } else {
            Write-Host "WARNING: oneAPI setvars.bat not found"
          }

      - name: Configure (CUDA)
        if: matrix.config.setup == 'cuda'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -S . -B build -G "Ninja" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DBUILD_SHARED_LIBS=ON ^
            -DAUDIOCPP_BUILD_CAPI=ON ^
            -DENGINE_BUILD_EXAMPLES=OFF ^
            -DENGINE_ENABLE_OPENMP=OFF ^
            -DENGINE_ENABLE_CUDA=ON ^
            -DCMAKE_CUDA_ARCHITECTURES="80;86;89;90"

      - name: Configure (ROCm)
        if: matrix.config.setup == 'rocm'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -S . -B build -G "Ninja" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DBUILD_SHARED_LIBS=ON ^
            -DAUDIOCPP_BUILD_CAPI=ON ^
            -DENGINE_BUILD_EXAMPLES=OFF ^
            -DENGINE_ENABLE_OPENMP=OFF ^
            -DGGML_HIP=ON ^
            -DAMDGPU_TARGETS=gfx1100

      - name: Configure (SYCL)
        if: matrix.config.setup == 'sycl'
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Intel\oneAPI\setvars.bat" intel64 vs2022
          cmake -S . -B build -G "Ninja" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DBUILD_SHARED_LIBS=ON ^
            -DAUDIOCPP_BUILD_CAPI=ON ^
            -DENGINE_BUILD_EXAMPLES=OFF ^
            -DENGINE_ENABLE_OPENMP=OFF ^
            -DGGML_SYCL=ON ^
            -DGGML_SYCL_TARGET=INTEL_XMX

      - name: Build audiocpp shared library
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build build --parallel %NUMBER_OF_PROCESSORS% --target audiocpp

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Get-ChildItem -Path build -Recurse -Filter "audiocpp.dll" | ForEach-Object { Copy-Item $_.FullName -Destination artifacts/ }
          Get-ChildItem -Path build -Recurse -Filter "audiocpp.lib" | ForEach-Object { Copy-Item $_.FullName -Destination artifacts/ }
          Copy-Item capi/include/audiocpp.h -Destination artifacts/
          Get-ChildItem artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: audiocpp-${{ matrix.config.artifact_suffix }}
          path: artifacts/

  # ════════════════════════════════════════════════════════════════════════
  # Release
  # ════════════════════════════════════════════════════════════════════════
  release:
    name: Release
    needs: [linux, windows]
    runs-on: ubuntu-latest
    if: always() && github.event.inputs.release_tag != ''

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: C ABI ${{ github.event.inputs.release_tag }}
          body: |
            ## audio.cpp C ABI shared libraries

            | Platform | Backend | Artifact |
            |----------|---------|----------|
            | Linux | CUDA + CPU | `audiocpp-linux-cuda-cpu` |
            | Linux | ROCm + CPU | `audiocpp-linux-rocm-cpu` |
            | Linux | SYCL + CPU | `audiocpp-linux-sycl-cpu` |
            | Windows | CUDA + CPU | `audiocpp-windows-cuda-cpu` |
            | Windows | ROCm + CPU | `audiocpp-windows-rocm-cpu` (best-effort) |
            | Windows | SYCL + CPU | `audiocpp-windows-sycl-cpu` (best-effort) |

            Each artifact contains:
            - `libaudiocpp.so` / `audiocpp.dll` (shared library, ggml symbols hidden)
            - `audiocpp.h` (C ABI header)
          files: |
            artifacts/*/libaudiocpp.so
            artifacts/*/audiocpp.dll
            artifacts/*/audiocpp.lib
            artifacts/*/audiocpp.h
          draft: true
