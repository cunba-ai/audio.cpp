name: C ABI Build

# Builds the C ABI shared library (libaudiocpp.so / audiocpp.dll) for each GPU
# backend, borrowing the proven toolchain-install patterns from llama.cpp's
# build-combined-backends.yml (cached CUDA/HIP SDK, the real AMD HIP SDK .exe,
# the offline oneAPI installer + Level Zero SDK, ccache). Unlike the llama.cpp
# reference, this produces single-backend shared libraries (no Vulkan co-build,
# no GGML_BACKEND_DL) and ships them via a GitHub draft release (no OSS).
#
# Linux jobs run in vendor containers (CUDA/ROCm/SYCL) and are the reliable
# signal. Windows CUDA must pass; Windows ROCm and SYCL are best-effort
# (continue-on-error): hosted runners have no AMD/Intel GPU, so they only
# prove MSVC configure/compile, and the vendor toolchains are large/flaky.
# All jobs must pass (no continue-on-error).

on:
  push:
    branches:
      - main
      - dev
      - capi/**
    paths:
      - '.github/workflows/capi-build.yml'
      - 'CMakeLists.txt'
      - 'capi/**'
      - 'src/**'
      - 'include/**'
      - 'external/ggml/**'
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read
  actions: write   # needed to save toolchain caches

env:
  CUDA_ARCHS: "61;70;75;80;86;89;120"
  AMDGPU_TARGETS: "gfx1100;gfx1101;gfx1102;gfx1150;gfx1151;gfx1200;gfx1201"
  OSS_BUCKET: "miaosoft-internal"
  OSS_ENDPOINT: "oss-cn-shanghai.aliyuncs.com"
  OSS_PREFIX: "cunba.ai/audio.cpp"

concurrency:
  group: capi-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════════════════════════════════
  # Linux: CUDA+CPU, ROCm+CPU, SYCL+CPU
  # ════════════════════════════════════════════════════════════════════════
  linux:
    name: Linux ${{ matrix.config.name }}
    runs-on: ubuntu-22.04
    container:
      image: ${{ matrix.config.container }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: CUDA-CPU
            container: nvidia/cuda:12.9.1-devel-ubuntu22.04
            cmake_extra: '-DENGINE_ENABLE_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES="61;70;75;80;86;89;120"'
            artifact_suffix: linux-cuda-cpu
          - name: ROCm-CPU
            container: rocm/dev-ubuntu-22.04:6.4-complete
            cmake_extra: '-DGGML_HIP=ON -DGPU_TARGETS="gfx1100;gfx1101;gfx1102;gfx1150;gfx1151;gfx1200;gfx1201" -DCMAKE_PREFIX_PATH=/opt/rocm'
            artifact_suffix: linux-rocm-cpu
          - name: SYCL-CPU
            container: intel/oneapi-basekit:2025.3.1-0-devel-ubuntu24.04
            cmake_extra: '-DCMAKE_C_COMPILER=icx -DCMAKE_CXX_COMPILER=icpx -DGGML_SYCL=ON -DGGML_SYCL_TARGET=INTEL'
            artifact_suffix: linux-sycl-cpu

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build deps
        run: |
          apt-get update
          # Retry downloads: archive.ubuntu.com is intermittently unreachable
          # from inside GitHub Actions containers (transient connection drops).
          apt-get -o Acquire::Retries=5 install -y cmake git build-essential

      - name: ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: capi-linux-${{ matrix.config.artifact_suffix }}
          update-package-index: true

      - name: Configure
        run: |
          # Source oneAPI env if present AND not already loaded (the SYCL
          # container auto-sources setvars, so re-sourcing errors out).
          if [ -f /opt/intel/oneapi/setvars.sh ] && [ -z "$ONEAPI_ROOT" ]; then
            . /opt/intel/oneapi/setvars.sh
          fi
          mkdir -p build
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DBUILD_SHARED_LIBS=ON \
            -DAUDIOCPP_BUILD_CAPI=ON \
            -DENGINE_BUILD_EXAMPLES=OFF \
            -DENGINE_ENABLE_OPENMP=OFF \
            ${{ matrix.config.cmake_extra }}

      - name: Build audiocpp shared library
        run: |
          if [ -f /opt/intel/oneapi/setvars.sh ] && [ -z "$ONEAPI_ROOT" ]; then
            . /opt/intel/oneapi/setvars.sh
          fi
          cmake --build build --parallel $(nproc) --target audiocpp

      - name: Verify exported symbols (Linux)
        shell: bash
        run: |
          set -e
          # Extract exported function symbols; fail if any non-audiocpp_ leak.
          SO=$(find build -name "libaudiocpp.so" | head -1)
          echo "Checking: $SO"
          EXPORTED=$(nm -D --defined-only "$SO" | awk '$2 == "T" {print $3}')
          echo "Exported symbols:"
          echo "$EXPORTED" | sed 's/^/  /'
          LEAKED=$(echo "$EXPORTED" | grep -v '^audiocpp_' || true)
          if [ -n "$LEAKED" ]; then
            echo "::error::Non-audiocpp_ symbols leaked into export table:"
            echo "$LEAKED" | sed 's/^/  /'
            exit 1
          fi
          echo "✅ All exported symbols are audiocpp_*"

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find build -name "libaudiocpp.so" -exec cp {} artifacts/ \;
          cp capi/include/audiocpp.h artifacts/
          strip artifacts/libaudiocpp.so 2>/dev/null || true
          ls -la artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: audiocpp-${{ matrix.config.artifact_suffix }}
          path: artifacts/

  # ════════════════════════════════════════════════════════════════════════
  # Windows: CUDA+CPU (primary), ROCm+CPU (best-effort), SYCL+CPU (best-effort)
  # ════════════════════════════════════════════════════════════════════════
  windows:
    name: Windows ${{ matrix.config.name }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: CUDA-CPU
            setup: cuda
            artifact_suffix: windows-cuda-cpu
          - name: ROCm-CPU
            setup: rocm
            artifact_suffix: windows-rocm-cpu
          - name: SYCL-CPU
            setup: sycl
            artifact_suffix: windows-sycl-cpu

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: capi-windows-${{ matrix.config.artifact_suffix }}
          update-package-index: true

      - name: Setup CUDA Toolkit
        if: matrix.config.setup == 'cuda'
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.9.0'
          method: 'network'

      # ── ROCm/HIP: real AMD HIP SDK installer (llama.cpp pattern) ──────────
      # Hosted runners have no AMD GPU, so this only proves configure/compile.
      # Best-effort (continue-on-error) — Linux ROCm is the reliable signal.
      - name: Cache ROCm Installation
        if: matrix.config.setup == 'rocm'
        id: cache-rocm
        uses: actions/cache@v5
        with:
          path: C:\Program Files\AMD\ROCm
          key: cache-gha-rocm-26.Q1-${{ runner.os }}

      - name: Install ROCm HIP SDK
        if: matrix.config.setup == 'rocm' && steps.cache-rocm.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $url = "https://download.amd.com/developer/eula/rocm-hub/AMD-Software-PRO-Edition-26.Q1-Win11-For-HIP.exe"
          Write-Host "Downloading AMD HIP SDK Installer..."
          Invoke-WebRequest -Uri $url -OutFile "${env:RUNNER_TEMP}\rocm-install.exe" -UseBasicParsing
          Write-Host "Installing AMD HIP SDK..."
          $proc = Start-Process "${env:RUNNER_TEMP}\rocm-install.exe" -ArgumentList '-install' -NoNewWindow -PassThru
          $completed = $proc.WaitForExit(600000)
          if (-not $completed) {
            Write-Host "##[error]ROCm installation timed out after 10 minutes. Killing the process."
            $proc.Kill()
            exit 1
          }
          if ($proc.ExitCode -ne 0) {
            Write-Host "##[error]ROCm installation failed with exit code $($proc.ExitCode)."
            exit 1
          }

      - name: Verify ROCm HIP SDK
        if: matrix.config.setup == 'rocm'
        shell: pwsh
        run: |
          $hipClang = Get-ChildItem -Path "C:\Program Files\AMD\ROCm" -Recurse -Filter "clang.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $hipClang) {
            Write-Host "##[error]AMD HIP SDK not found (no clang.exe under C:\Program Files\AMD\ROCm). Cannot proceed with ROCm build."
            exit 1
          }
          Write-Host "Found HIP clang at: $($hipClang.FullName)"

      # ── SYCL/DPC++: offline oneAPI installer + Level Zero (llama.cpp pattern) ──
      # Pinned to a known-good oneAPI Essentials offline installer. This URL
      # will eventually rot on Intel's release schedule — swap the constant
      # below if it 403/Access-Denies. Best-effort (continue-on-error).
      - name: Download & Install oneAPI
        if: matrix.config.setup == 'sycl'
        env:
          WINDOWS_BASEKIT_URL: https://registrationcenter-download.intel.com/akdlm/IRC_NAS/b60765d1-2b85-4e85-86b6-cb0e9563a699/intel-deep-learning-essentials-2025.3.3.18_offline.exe
          WINDOWS_DPCPP_MKL: intel.oneapi.win.cpp-dpcpp-common:intel.oneapi.win.mkl.devel:intel.oneapi.win.dnnl:intel.oneapi.win.tbb.devel
        shell: cmd
        run: scripts\install-oneapi.bat "%WINDOWS_BASEKIT_URL%" "%WINDOWS_DPCPP_MKL%"

      - name: Install Level Zero SDK
        if: matrix.config.setup == 'sycl'
        env:
          LEVEL_ZERO_SDK_URL: https://github.com/oneapi-src/level-zero/releases/download/v1.28.2/level-zero-win-sdk-1.28.2.zip
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:LEVEL_ZERO_SDK_URL -OutFile "level-zero-win-sdk.zip" -UseBasicParsing
          Expand-Archive -Path "level-zero-win-sdk.zip" -DestinationPath "C:/level-zero-sdk" -Force
          "LEVEL_ZERO_V1_SDK_PATH=C:/level-zero-sdk" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Verify oneAPI
        if: matrix.config.setup == 'sycl'
        shell: pwsh
        run: |
          if (Test-Path "C:\Program Files (x86)\Intel\oneAPI\setvars.bat") {
            Write-Host "oneAPI installed successfully"
          } else {
            Write-Host "##[error]oneAPI setvars.bat not found after install; DPC++ compiler unavailable. Cannot proceed with SYCL build."
            exit 1
          }

      - name: Configure (CUDA)
        if: matrix.config.setup == 'cuda'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -S . -B build -G "Ninja" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_C_COMPILER_LAUNCHER=ccache ^
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache ^
            -DBUILD_SHARED_LIBS=ON ^
            -DAUDIOCPP_BUILD_CAPI=ON ^
            -DENGINE_BUILD_EXAMPLES=OFF ^
            -DENGINE_ENABLE_OPENMP=OFF ^
            -DENGINE_ENABLE_CUDA=ON ^
            -DCMAKE_CUDA_ARCHITECTURES="${{ env.CUDA_ARCHS }}"

      - name: Configure (ROCm)
        if: matrix.config.setup == 'rocm'
        shell: pwsh
        run: |
          $hipPath = (Resolve-Path 'C:\Program Files\AMD\ROCm\*\bin\clang.exe' | Split-Path | Split-Path)
          Write-Host "HIP_PATH: $hipPath"
          cmake -G "Unix Makefiles" -B build -S . `
            -DCMAKE_C_COMPILER="$hipPath\bin\clang.exe" `
            -DCMAKE_CXX_COMPILER="$hipPath\bin\clang++.exe" `
            -DCMAKE_C_COMPILER_LAUNCHER=ccache `
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SHARED_LIBS=ON `
            -DAUDIOCPP_BUILD_CAPI=ON `
            -DENGINE_BUILD_EXAMPLES=OFF `
            -DENGINE_ENABLE_OPENMP=OFF `
            -DGGML_HIP=ON `
            -DGPU_TARGETS="${{ env.AMDGPU_TARGETS }}" `
            -DCMAKE_PREFIX_PATH="$hipPath"

      - name: Configure (SYCL)
        if: matrix.config.setup == 'sycl'
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Intel\oneAPI\setvars.bat" intel64 --force
          cmake -S . -B build -G "Ninja" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_C_COMPILER_LAUNCHER=ccache ^
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache ^
            -DCMAKE_C_COMPILER=cl ^
            -DCMAKE_CXX_COMPILER=icx ^
            -DBUILD_SHARED_LIBS=ON ^
            -DAUDIOCPP_BUILD_CAPI=ON ^
            -DENGINE_BUILD_EXAMPLES=OFF ^
            -DGGML_SYCL=ON ^
            -DGGML_SYCL_F16=OFF ^
            -DGGML_SYCL_TARGET=INTEL

      - name: Build audiocpp shared library (CUDA)
        if: matrix.config.setup == 'cuda'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build build --parallel %NUMBER_OF_PROCESSORS% --target audiocpp

      # ROCm builds with clang (HIP), not MSVC. Add HIP bin to PATH so the
      # clang/clang++ recorded by Configure remains invokable.
      - name: Build audiocpp shared library (ROCm)
        if: matrix.config.setup == 'rocm'
        shell: pwsh
        run: |
          $hipPath = (Resolve-Path 'C:\Program Files\AMD\ROCm\*\bin\clang.exe' | Split-Path | Split-Path)
          $env:Path = "$hipPath\bin;$env:Path"
          cmake --build build --parallel $env:NUMBER_OF_PROCESSORS --target audiocpp

      # SYCL needs oneAPI's setvars.bat (for icx) AND vcvars64.bat (for cl,
      # the C frontend icx targets on Windows).
      - name: Build audiocpp shared library (SYCL)
        if: matrix.config.setup == 'sycl'
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Intel\oneAPI\setvars.bat" intel64 --force
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build build --parallel %NUMBER_OF_PROCESSORS% --target audiocpp

      - name: Verify exported symbols (Windows)
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Path build -Recurse -Filter "audiocpp.dll" | Select-Object -First 1
          if (-not $dll) { Write-Host "##[error]audiocpp.dll not found"; exit 1 }
          Write-Host "Checking: $($dll.FullName)"
          # Parse PE export table directly (no dumpbin dependency)
          $bytes = [System.IO.File]::ReadAllBytes($dll.FullName)
          $peOff = [BitConverter]::ToInt32($bytes, 0x3C)
          $optHdr = $peOff + 24
          $magic = [BitConverter]::ToUInt16($bytes, $optHdr)
          $ddOff = if ($magic -eq 0x10b) { $optHdr + 96 } else { $optHdr + 112 }
          $expRVA = [BitConverter]::ToInt32($bytes, $ddOff)
          $expSize = [BitConverter]::ToInt32($bytes, $ddOff + 4)
          if ($expSize -eq 0) { Write-Host "✅ No exports (empty DLL?)"; exit 0 }
          # Section table to map RVA → file offset
          $numSec = [BitConverter]::ToUInt16($bytes, $peOff + 6)
          $szOpt  = [BitConverter]::ToUInt16($bytes, $peOff + 20)
          $secOff = $peOff + 24 + $szOpt
          function RvaToOff($rva) {
            for ($i = 0; $i -lt $numSec; $i++) {
              $b = $secOff + $i * 40
              $va = [BitConverter]::ToUInt32($bytes, $b + 12)
              $vs = [BitConverter]::ToUInt32($bytes, $b + 8)
              $raw = [BitConverter]::ToUInt32($bytes, $b + 20)
              if ($va -le $rva -and $rva -lt ($va + [Math]::Max($vs, [BitConverter]::ToUInt32($bytes, $b + 16)))) {
                return $raw + ($rva - $va)
              }
            }
            return -1
          }
          $expOff = RvaToOff $expRVA
          $nNames = [BitConverter]::ToInt32($bytes, $expOff + 24)
          $namesRVA = [BitConverter]::ToInt32($bytes, $expOff + 32)
          $namesOff = RvaToOff $namesRVA
          $symbols = @()
          for ($i = 0; $i -lt $nNames; $i++) {
            $nameRVA = [BitConverter]::ToInt32($bytes, $namesOff + $i * 4)
            $nameOff = RvaToOff $nameRVA
            $end = $nameOff
            while ($bytes[$end] -ne 0) { $end++ }
            $symbols += [System.Text.Encoding]::ASCII.GetString($bytes, $nameOff, $end - $nameOff)
          }
          Write-Host "Exported symbols ($($symbols.Count)):"
          $symbols | ForEach-Object { Write-Host "  $_" }
          $leaked = $symbols | Where-Object { $_ -notmatch '^audiocpp_' }
          if ($leaked) {
            Write-Host "##[error]Non-audiocpp_ symbols leaked into export table:"
            $leaked | ForEach-Object { Write-Host "  $_" }
            exit 1
          }
          Write-Host "✅ All exported symbols are audiocpp_*"

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Get-ChildItem -Path build -Recurse -Filter "audiocpp.dll" | ForEach-Object { Copy-Item $_.FullName -Destination artifacts/ }
          Get-ChildItem -Path build -Recurse -Filter "audiocpp.lib" | ForEach-Object { Copy-Item $_.FullName -Destination artifacts/ }
          Copy-Item capi/include/audiocpp.h -Destination artifacts/
          Get-ChildItem artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: audiocpp-${{ matrix.config.artifact_suffix }}
          path: artifacts/

  # ════════════════════════════════════════════════════════════════════════
  # Publish to Alibaba Cloud OSS (always runs; best-effort Windows jobs
  # that fail are skipped since their artifacts won't exist)
  # ════════════════════════════════════════════════════════════════════════
  publish-oss:
    name: Publish to OSS
    runs-on: ubuntu-22.04
    needs: [linux, windows]
    if: always()

    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute version strings
        run: |
          echo "BUILD_DATE=$(date -u +%Y%m%d)" >> $GITHUB_ENV
          echo "COMMIT_ID=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./artifact

      - name: List downloaded artifacts
        run: ls -R artifact/ || true

      - name: Install ossutil
        run: |
          curl -o ossutil64 "https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64"
          chmod +x ossutil64
          ./ossutil64 version || true

      - name: Upload to OSS
        env:
          OSS_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_KEY: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          set -e
          # Each artifact downloads as a subdirectory (audiocpp-windows-cuda-cpu/,
          # audiocpp-linux-sycl-cpu/, etc). Zip each into a single .zip for OSS.
          mkdir -p zips
          for d in artifact/*/; do
            name=$(basename "$d")
            (cd "$d" && zip -r "../../zips/${name}.zip" .)
            echo "zipped ${name}.zip"
          done
          if [ ! -d zips ] || [ -z "$(ls -A zips 2>/dev/null)" ]; then
            echo "No artifacts to upload"; exit 0
          fi
          for f in zips/*.zip; do
            [ -f "$f" ] || continue
            echo "== $f =="
            # Dated snapshot (retention/history)
            ./ossutil64 cp "$f" "oss://${{ env.OSS_BUCKET }}/${{ env.OSS_PREFIX }}/${{ env.BUILD_DATE }}-${{ env.COMMIT_ID }}/$(basename $f)" \
              -i "$OSS_ID" -k "$OSS_KEY" -e "${{ env.OSS_ENDPOINT }}" -f
            # Latest pointer (always overwritten)
            ./ossutil64 cp "$f" "oss://${{ env.OSS_BUCKET }}/${{ env.OSS_PREFIX }}/latest/$(basename $f)" \
              -i "$OSS_ID" -k "$OSS_KEY" -e "${{ env.OSS_ENDPOINT }}" -f
          done
