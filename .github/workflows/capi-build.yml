name: C ABI Build

on:
  push:
    branches:
      - main
      - dev
      - capi/**
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. capi-v0.1.0). Leave empty to skip release upload.'
        required: false
        type: string

# Cancel superseded runs on the same ref
concurrency:
  group: capi-build-${{ github.ref }}-${{ github.event.inputs.release_tag || 'none' }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════════════════════════════════
  # Linux: CUDA + CPU, ROCm + CPU, SYCL + CPU
  # ════════════════════════════════════════════════════════════════════════
  linux:
    name: Linux ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.runner }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: CUDA-CPU
            runner: ubuntu-24.04
            container: nvidia/cuda:12.4.1-devel-ubuntu24.04
            cmake_extra: '-DENGINE_ENABLE_CUDA=ON -DENGINE_ENABLE_NATIVE_CPU=OFF'
            artifact_suffix: linux-cuda-cpu
            strip: true
          - name: ROCm-CPU
            runner: ubuntu-24.04
            container: rocm/dev-ubuntu-24.04:6.2
            cmake_extra: '-DGGML_HIPBLAS=ON -DENGINE_ENABLE_NATIVE_CPU=OFF'
            artifact_suffix: linux-rocm-cpu
            strip: true
          - name: SYCL-CPU
            runner: ubuntu-24.04
            container: intel/oneapi-basekit:2024.2-devel-ubuntu24.04
            cmake_extra: '-DGGML_SYCL=ON -DGGML_SYCL_TARGET=INTEL_XMX -DENGINE_ENABLE_NATIVE_CPU=OFF'
            artifact_suffix: linux-sycl-cpu
            strip: true

    container:
      image: ${{ matrix.config.container }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps
        run: |
          apt-get update && apt-get install -y cmake git build-essential

      - name: Configure
        run: |
          mkdir -p build
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DAUDIOCPP_BUILD_CAPI=ON \
            -DENGINE_BUILD_EXAMPLES=OFF \
            ${{ matrix.config.cmake_extra }}

      - name: Build audiocpp shared library
        run: |
          cmake --build build --parallel $(nproc) --target audiocpp

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp build/libaudiocpp.so artifacts/ 2>/dev/null || true
          cp build/bin/libaudiocpp.so artifacts/ 2>/dev/null || true
          # Find the .so wherever CMake put it
          find build -name "libaudiocpp.so" -exec cp {} artifacts/ \; 2>/dev/null
          cp capi/include/audiocpp.h artifacts/
          ls -la artifacts/

      - name: Strip (optional)
        if: matrix.config.strip
        run: |
          strip artifacts/libaudiocpp.so 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: audiocpp-${{ matrix.config.artifact_suffix }}
          path: artifacts/

  # ════════════════════════════════════════════════════════════════════════
  # Windows: CUDA + CPU, ROCm (HIP) + CPU, SYCL + CPU
  # ════════════════════════════════════════════════════════════════════════
  windows:
    name: Windows ${{ matrix.config.name }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: CUDA-CPU
            cmake_extra: '-DENGINE_ENABLE_CUDA=ON -DGGML_CUDA=ON -DCMAKE_CUDA_COMPILER="C:/Program Files/NVIDIA GPU Computing Toolkit/CUDA/v12.6/bin/nvcc.exe"'
            artifact_suffix: windows-cuda-cpu
            setup: ''
          - name: ROCm-CPU
            cmake_extra: '-DGGML_HIP=ON -DCMAKE_HIP_COMPILER="C:/Program Files/AMD/ROCm/6.3/bin/clang.exe" -DAMDGPU_TARGETS=gfx1100'
            artifact_suffix: windows-rocm-cpu
            setup: 'rocm'
          - name: SYCL-CPU
            cmake_extra: '-DGGML_SYCL=ON -DGGML_SYCL_TARGET=INTEL_XMX -DCMAKE_C_COMPILER=icx -DCMAKE_CXX_COMPILER=icpx'
            artifact_suffix: windows-sycl-cpu
            setup: 'sycl'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CUDA
        if: matrix.config.setup == ''
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: '12.6.2'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cublas", "cufft"]'

      - name: Setup ROCm (AMD HIP SDK)
        if: matrix.config.setup == 'rocm'
        shell: pwsh
        run: |
          Write-Host "Installing AMD HIP SDK for Windows..."
          # Download AMD HIP SDK installer
          $installerUrl = "https://download.amd.com/developer/eula/ROCm/ROCm-6.3/AMD-Software-PRO-Edition-25.3-WindowsSvr2022-WSH.exe"
          $installerPath = "$env:TEMP\amdrocm.exe"
          Write-Host "Downloading from $installerUrl (this may take a while)..."
          Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath -UseBasicParsing
          # Silent install
          Start-Process -FilePath $installerPath -ArgumentList "-install -log $env:TEMP\rocm_install.log" -Wait -NoNewWindow
          # Verify
          if (Test-Path "C:/Program Files/AMD/ROCm/6.3/bin/clang.exe") {
            Write-Host "ROCm HIP SDK installed successfully"
          } else {
            Write-Host "WARNING: ROCm clang not found at expected path, searching..."
            Get-ChildItem -Path "C:/Program Files/AMD" -Recurse -Filter "clang.exe" -ErrorAction SilentlyContinue | Select-Object -First 3 -ExpandProperty FullName
          }

      - name: Setup SYCL (Intel oneAPI)
        if: matrix.config.setup == 'sycl'
        shell: pwsh
        run: |
          Write-Host "Installing Intel oneAPI Base Toolkit..."
          # Download oneAPI installer
          $installerUrl = "https://registrationcenter-download.intel.com/akdlm/IRC_NAS/b0bacc74-0863-4f96-844e-8a2ff5db5e96/w_BaseKit_p_2025.0.0.841_offline.exe"
          $installerPath = "$env:TEMP\oneapi_basekit.exe"
          Write-Host "Downloading from $installerUrl (this may take a while)..."
          Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath -UseBasicParsing
          # Silent install (DPC++/C++ compiler component only)
          Start-Process -FilePath $installerPath -ArgumentList "-s --action install --components intel.oneapi.win.dpcpp-cli --eula accept" -Wait -NoNewWindow
          # Initialize oneAPI environment
          if (Test-Path "C:/Program Files (x86)/Intel/oneAPI/setvars.bat") {
            Write-Host "Intel oneAPI installed successfully"
          } else {
            Write-Host "WARNING: oneAPI setvars.bat not found at expected path"
            Get-ChildItem -Path "C:/Program Files*" -Recurse -Filter "setvars.bat" -ErrorAction SilentlyContinue | Select-Object -First 3 -ExpandProperty FullName
          }

      - name: Configure
        shell: pwsh
        run: |
          $syclEnv = ""
          if ("${{ matrix.config.setup }}" -eq "sycl") {
            # Initialize oneAPI environment for SYCL
            $syclEnv = '& "C:/Program Files (x86)/Intel/oneAPI/setvars.bat" intel64 vs2022; '
          }
          $cmd = $syclEnv + 'cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON -DAUDIOCPP_BUILD_CAPI=ON -DENGINE_BUILD_EXAMPLES=OFF -DENGINE_ENABLE_NATIVE_CPU=OFF ${{ matrix.config.cmake_extra }}'
          Write-Host "Running: $cmd"
          cmd /c $cmd

      - name: Build audiocpp shared library
        shell: pwsh
        run: |
          cmake --build build --parallel $env:NUMBER_OF_PROCESSORS --target audiocpp

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Get-ChildItem -Path build -Recurse -Filter "audiocpp.dll" | ForEach-Object {
            Copy-Item $_.FullName -Destination artifacts/
          }
          Get-ChildItem -Path build -Recurse -Filter "audiocpp.lib" | ForEach-Object {
            Copy-Item $_.FullName -Destination artifacts/
          }
          Copy-Item capi/include/audiocpp.h -Destination artifacts/
          Get-ChildItem artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: audiocpp-${{ matrix.config.artifact_suffix }}
          path: artifacts/

  # ════════════════════════════════════════════════════════════════════════
  # Release: upload all artifacts to a GitHub release (optional)
  # ════════════════════════════════════════════════════════════════════════
  release:
    name: Release
    needs: [linux, windows]
    runs-on: ubuntu-latest
    if: github.event.inputs.release_tag != ''

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: C ABI ${{ github.event.inputs.release_tag }}
          body: |
            ## audio.cpp C ABI shared libraries

            | Platform | Backend | Artifact |
            |----------|---------|----------|
            | Linux | CUDA + CPU | `audiocpp-linux-cuda-cpu` |
            | Linux | ROCm + CPU | `audiocpp-linux-rocm-cpu` |
            | Linux | SYCL + CPU | `audiocpp-linux-sycl-cpu` |
            | Windows | CUDA + CPU | `audiocpp-windows-cuda-cpu` |
            | Windows | ROCm + CPU | `audiocpp-windows-rocm-cpu` |
            | Windows | SYCL + CPU | `audiocpp-windows-sycl-cpu` |

            Each artifact contains:
            - `libaudiocpp.so` / `audiocpp.dll` (shared library, ggml symbols hidden)
            - `audiocpp.h` (C ABI header)
          files: |
            artifacts/*/libaudiocpp.so
            artifacts/*/audiocpp.dll
            artifacts/*/audiocpp.lib
            artifacts/*/audiocpp.h
          draft: true
